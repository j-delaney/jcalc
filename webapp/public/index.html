<!doctype html>
<html>
  <head lang="en">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>JCalc</title>

    <style>
      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        color: #333;
        font-weight: 300;
      }

      .code-window {
        border-radius: 0.8rem;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.16);
        background: #fff;
        width: 662px;
      }

      .code-editor {
        position: relative;
        width: 100%;
        height: 500px;
      }

      .settings {
        width: 662px;
        margin-top: 1rem;
        padding: 0.8rem 1rem;
        border-radius: 0.8rem;
        background: #fff;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.16);
        box-sizing: border-box;
      }

      .settings summary {
        cursor: pointer;
        font-weight: 400;
      }

      .settings .settings-fields {
        display: flex;
        gap: 1.5rem;
        margin-top: 0.8rem;
        flex-wrap: wrap;
      }

      .settings label {
        display: flex;
        flex-direction: column;
        font-size: 0.85rem;
        gap: 0.3rem;
      }

      .settings input[type="number"] {
        width: 6rem;
      }

      #demo {
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="code-window">
      <div class="code-editor"></div>
    </div>

    <button id="save">Save</button>
    <label>
      <input type="checkbox" id="autosave" />
      Autosave
    </label>

    <details class="settings">
      <summary>Output settings</summary>
      <div class="settings-fields">
        <label>
          Display precision
          <input type="number" id="display-precision" min="1" step="1" />
        </label>
        <label>
          Exponent threshold
          <input type="number" id="exponent-threshold" min="1" step="1" />
        </label>
        <label>
          Exponent decimals
          <input type="number" id="exponent-decimals" min="0" step="1" />
        </label>
      </div>
    </details>

    <button id="demo">Demo</button>

    <script type="module" src="module/main.js"></script>
  </body>
</html>
